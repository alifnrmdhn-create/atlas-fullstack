# =========================================================
# ATLAS — Docker Compose PRODUKSI (Coolify). Pola mirror PTI / erin-v2: app
# dipecah jadi container terpisah supaya job/scheduler TIDAK mencekik web
# (nginx+php-fpm). Fix permanen 504 Gateway Timeout intermiten.
#
#   app    → WEB: nginx + php-fpm  (SATU-SATUNYA penerima trafik publik/Traefik)
#   worker → queue:work x2 + schedule:work  (SCHEDULER ESENSIAL: realtime polling
#            ATLAS bergantung pada atlas:cleanup-broadcast-events tiap menit)
#   redis  → backend session/cache/queue (DORMANT — di-comment; ATLAS default
#            session=database, cache=file, queue=sync)
#   reverb → WebSocket (DORMANT — ATLAS realtime = polling, bukan WS)
#
# Container app & worker memakai IMAGE YANG SAMA (atlas-app:prod), beda
# CONTAINER_ROLE (lihat docker/start.sh). Nama service web tetap "app".
#
# DB = PostgreSQL EKSTERNAL — DB_HOST dkk DARI .env (di Coolify: Environment
# Variables), TIDAK di-override di sini. Run lokal ke Postgres host: set
# DB_HOST=host.docker.internal di .env. Schema non-`public` `ptpn_kmr_app`
# dipastikan ada oleh start.sh (psql) sebelum migrate.
#
# Run (lokal): docker compose up -d --build   (akses via docker-compose.override.yml)
# =========================================================

# ─────────────────────────────────────────────────────────────────────────────
# REDIS DIMATIKAN DULU (mirror erin). ATLAS tetap database/file/sync dari .env.
# Image tetap punya ekstensi phpredis (Dockerfile), jadi mengaktifkan Redis nanti
# TIDAK perlu ubah image. AKTIFKAN: uncomment 4 titik bertanda "[REDIS]" di bawah.
# ⚠ Saat diaktifkan & driver dipindah ke redis: sesi/cache lama tak terbawa.
# ─────────────────────────────────────────────────────────────────────────────
# [REDIS] (1) anchor env — uncomment untuk aktifkan Redis
# x-redis-env: &redis-env
#   REDIS_HOST: redis
#   REDIS_PORT: "6379"
#   REDIS_CLIENT: phpredis
#   SESSION_DRIVER: redis
#   CACHE_STORE: redis
#   QUEUE_CONNECTION: redis

# Konfigurasi dasar yang dipakai bersama container app (web + worker).
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: atlas-app:prod
  restart: always
  env_file:
    - path: .env
      required: false
  volumes:
    # Upload user (disk privat 'local' = storage/app) + log. NAMED VOLUME supaya
    # DURABLE lintas redeploy (di luar git-checkout Coolify).
    - app_storage:/var/www/html/storage
  networks:
    - atlas
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  # ---- WEB: nginx + php-fpm. Hanya service ini yang di-route Traefik (domain). ----
  app:
    <<: *app
    container_name: atlas_app
    environment:
      # [REDIS] (2) uncomment baris berikut untuk aktifkan Redis di web:
      # <<: *redis-env
      CONTAINER_ROLE: web
    # Traefik WAJIB meraih container web ini lewat network `coolify`. Tanpa label
    # ini Traefik bisa menyimpan IP dari network yang salah → IP basi tiap deploy →
    # 504 untuk SEMUA request sampai `docker restart coolify-proxy` (akar "harus 2x
    # redeploy baru normal").
    labels:
      - "traefik.docker.network=coolify"
    # expose (bukan ports) = internal; Traefik route lewat domain + terminasi HTTPS.
    # Akses lokal lewat docker-compose.override.yml (publish 8080).
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/up"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  # ---- WORKER: queue:work (x2) + schedule:work. SCHEDULER ESENSIAL (realtime). ----
  worker:
    <<: *app
    container_name: atlas_worker
    environment:
      # [REDIS] (2) uncomment baris berikut untuk aktifkan Redis di worker:
      # <<: *redis-env
      CONTAINER_ROLE: worker
    # TIDAK ada expose/domain — murni background.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "supervisorctl -c /etc/supervisor/supervisord.worker.conf status | grep -q RUNNING || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ---- REDIS: backend session/cache/queue. DORMANT — uncomment untuk aktifkan. ----
  # [REDIS] (3) uncomment service redis + depends_on (di app & worker) + volume:
  # redis:
  #   image: redis:7-alpine
  #   container_name: atlas_redis
  #   restart: always
  #   command: ["redis-server", "--appendonly", "yes"]
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - atlas
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  # (lalu tambahkan ke app & worker:
  #   depends_on:
  #     redis:
  #       condition: service_healthy )

  # ---- REVERB: WebSocket. DORMANT — ATLAS pakai polling, bukan WS. Aktifkan
  #      hanya bila ATLAS pindah ke WebSocket: `composer require laravel/reverb`,
  #      tambahkan blok proxy /app di docker/nginx.conf, lalu UNCOMMENT blok ini. ----
  # reverb:
  #   <<: *app
  #   container_name: atlas_reverb
  #   environment:
  #     <<: *redis-env
  #     CONTAINER_ROLE: reverb
  #   expose:
  #     - "8081"
  #   healthcheck:
  #     test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8081' || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s

volumes:
  app_storage:
  # [REDIS] (4) uncomment untuk aktifkan Redis:
  # redis_data:

networks:
  atlas:
    driver: bridge
