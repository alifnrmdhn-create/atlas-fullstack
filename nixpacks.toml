[phases.install]
cmds = [
  # FrankenPHP standalone binary. WAJIB simpan di /app (working dir) — file di
  # /usr/local/bin tidak ikut persist ke runtime image Nixpacks.
  'mkdir -p bin',
  'curl -fsSL https://github.com/php/frankenphp/releases/download/v1.12.2/frankenphp-linux-x86_64 -o bin/frankenphp',
  'chmod +x bin/frankenphp',
  'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-gd',
  'npm ci'
]

[phases.build]
cmds = [
  'npm run build'
]

[start]
# FrankenPHP `php-server` mode: serve dari public/, auto-routing ke index.php.
# Native SSE (per-connection goroutine, no per-request worker exhaustion).
# `php` (Nixpacks-provided) tetap dipakai untuk CLI tasks; FrankenPHP punya bundled
# PHP-nya sendiri tapi tidak overlap dengan PATH `php`.
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && exec /app/bin/frankenphp php-server -r public/ --listen :$PORT"
