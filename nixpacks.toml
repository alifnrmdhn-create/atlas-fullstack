[phases.install]
cmds = [
  # FrankenPHP standalone binary. WAJIB simpan di /app (working dir) — file di
  # /usr/local/bin tidak ikut persist ke runtime image Nixpacks.
  'mkdir -p bin',
  'curl -fsSL https://github.com/php/frankenphp/releases/download/v1.12.2/frankenphp-linux-x86_64 -o bin/frankenphp',
  'chmod +x bin/frankenphp',
  'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-gd',
  'npm ci'
]

[phases.build]
cmds = [
  'npm run build'
]

[start]
# FrankenPHP `php-server` mode: 1 HTTP request = 1 PHP thread sampai response selesai.
# Thread count = num_cpu*2 default; sebelumnya jadi bottleneck saat masih ada SSE
# (tiap stream menahan thread 90s). Setelah refactor ke polling murni, tiap request
# short-lived (<100ms) — thread cepat balik ke pool, default thread count cukup.
# Boot sequence:
#   1. migrate --isolated — idempotent + lock atomik (scale-readiness S1.2): di
#                           rolling-deploy multi-replica, tiap container boot &
#                           jalankan migrate. --isolated (lock via cache store =
#                           database, S1.3) memastikan HANYA 1 container migrasi;
#                           sisanya skip seketika → tak ada race migrasi.
#                           CAVEAT env baru/fresh DB: cache_locks belum ada saat
#                           migrate pertama → jalankan `php artisan migrate` sekali
#                           manual dulu (atau first deploy single-replica), baru
#                           deploy multi-replica.
#   2. storage persisten  — volume Railway di-mount di /app/storage/app (2026-06-10;
#                           sebelumnya ephemeral: upload hilang tiap redeploy).
#                           mkdir target dulu (volume baru = kosong) lalu storage:link
#                           --force (symlink public/storage ada di image, hilang tiap
#                           deploy, jadi dibuat ulang saat boot)
#   3. cache config/routes/views
#   4. pre-boot cleanup   — flush stale broadcast_events kalau scheduler container lama mati
#   5. scheduler respawn  — auto-restart loop kalau schedule:work exit (sebelumnya fire-and-forget,
#                           silent-die kalau ada exception di salah satu scheduled command).
#                           Output SENGAJA dialirkan ke stdout (audit 2026-06-10: dulu >/dev/null
#                           → kegagalan scheduled command tak terlihat siapa pun); --whisper
#                           sudah meredam noise per-menit, yang lolos hanya output command & error.
#   6. frankenphp foreground (main process)
#
# PHP_INI_SCAN_DIR (leading ':' = APPEND ke default) memuat php-conf/*.ini —
# menaikkan upload_max_filesize/post_max_size dari default 2M/8M (yang menolak
# foto HP 2-5MB diam-diam) agar selaras validasi app 10MB (audit 2026-06-17).
# Berlaku utk artisan (nix PHP) DAN frankenphp (embedded PHP) — sistem ini sama.
cmd = "export PHP_INI_SCAN_DIR=\":/app/php-conf\" && php artisan migrate --force --isolated && mkdir -p storage/app/public && php artisan storage:link --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && (php artisan atlas:cleanup-broadcast-events || true) && (while true; do php artisan schedule:work --whisper; sleep 2; done &) && exec /app/bin/frankenphp php-server -r public/ --listen :$PORT"
