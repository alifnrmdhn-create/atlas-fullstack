[phases.install]
cmds = [
  'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-gd',
  'npm ci'
]

[phases.build]
cmds = [
  'npm run build'
]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
