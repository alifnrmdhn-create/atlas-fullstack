[phases.install]
cmds = [
  # FrankenPHP standalone binary. WAJIB simpan di /app (working dir) — file di
  # /usr/local/bin tidak ikut persist ke runtime image Nixpacks.
  'mkdir -p bin',
  'curl -fsSL https://github.com/php/frankenphp/releases/download/v1.12.2/frankenphp-linux-x86_64 -o bin/frankenphp',
  'chmod +x bin/frankenphp',
  'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-gd',
  'npm ci'
]

[phases.build]
cmds = [
  'npm run build'
]

[start]
# FrankenPHP `php-server` mode: 1 HTTP request = 1 PHP thread sampai response selesai.
# SSE streams menahan thread sampai TTL (90s) — default num_threads = num_cpu*2 = 4
# di Railway hobby (2 vCPU) menyebabkan ≥4 user simultan jadi thread starvation.
# `--num-threads 64` = headroom untuk ~50 user simultan via SSE; ~ribuan via polling.
# Boot sequence:
#   1. migrate            — idempotent, aman tiap deploy
#   2. cache config/routes/views
#   3. pre-boot cleanup   — flush stale broadcast_events kalau scheduler container lama mati
#   4. scheduler respawn  — auto-restart loop kalau schedule:work exit (sebelumnya fire-and-forget,
#                           silent-die kalau ada exception di salah satu scheduled command)
#   5. frankenphp foreground (main process)
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && (php artisan atlas:cleanup-broadcast-events || true) && (while true; do php artisan schedule:work --whisper; sleep 2; done >/dev/null 2>&1 &) && exec /app/bin/frankenphp php-server -r public/ --listen :$PORT --num-threads 64"
