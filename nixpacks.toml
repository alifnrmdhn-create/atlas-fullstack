[phases.install]
cmds = [
  # FrankenPHP: static single-binary PHP server (bundle Caddy + PHP runtime). Native SSE
  # support via per-connection goroutine — tidak ada per-request worker exhaustion seperti
  # `php artisan serve`. Pinned ke versi spesifik supaya build deterministic.
  'curl -fsSL https://github.com/php/frankenphp/releases/download/v1.12.2/frankenphp-linux-x86_64 -o /usr/local/bin/frankenphp',
  'chmod +x /usr/local/bin/frankenphp',
  'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-gd',
  'npm ci'
]

[phases.build]
cmds = [
  'npm run build'
]

[start]
# FrankenPHP `php-server` mode: serve dari public/, auto-routing ke index.php. Untuk
# CLI tasks (migrate, cache:*) tetap pakai `php` dari Nixpacks-provided PHP.
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && exec frankenphp php-server -r public/ --listen :$PORT"
