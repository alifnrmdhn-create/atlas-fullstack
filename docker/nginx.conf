user www-data www-data;
worker_processes auto;
daemon off;
pid /run/nginx.pid;

worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    index         index.html index.htm index.php;

    log_format main '$remote_addr - $remote_user [$time_local] $status '
                    '"$request" $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile        on;
    tcp_nopush      on;
    server_names_hash_bucket_size 128;

    # Fix 504 "stale keepalive" (mirror PTI/erin). Traefik bisa pakai-ulang koneksi
    # pool yang sudah basi untuk request POST → user kena 504 intermiten. Solusi:
    # MATIKAN keepalive ke Traefik (nginx balas `Connection: close`). Biaya: 1 TCP
    # handshake/request di bridge (TLS sudah diterminasi Traefik → overhead mikrodetik).
    keepalive_timeout  0;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php;
        charset utf-8;

        client_max_body_size 50M;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        # CATATAN: ATLAS realtime = POLLING (HTTP tiap 2s), BUKAN WebSocket/Reverb.
        # Karena itu TIDAK ada blok proxy `location /app/` → reverb di sini (beda
        # dari erin/PTI) — supaya tak menabrak route aplikasi & tak ada upstream mati.

        # Vite build assets — long-lived cache (content-hashed filenames).
        location /build {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ =404;
        }

        # Storage symlink.
        location /storage {
            try_files $uri $uri/ =404;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        # php-fpm pool status & health — internal only (diagnosa saturasi worker).
        location = /status {
            access_log off;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_NAME /status;
        }
        location = /fpm-ping {
            access_log off;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_NAME /fpm-ping;
        }

        location ~ \.php$ {
            fastcgi_buffer_size 16k;
            fastcgi_buffers 16 16k;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            include fastcgi.conf;

            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;

            # Debian fastcgi_params override HTTP_HOST jadi $host (tanpa port).
            # Laravel butuh port utuh untuk URL generation → set ulang ke $http_host.
            fastcgi_param HTTP_HOST $http_host;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
